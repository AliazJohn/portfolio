name: Build and Deploy Blog

on:
  push:
    paths:
      - '_posts/**'
      - 'blog/post-template.html'
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build Blog Posts
        run: npm run build

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          action_user="${GITHUB_ACTOR}"
          git config --local user.name "${action_user}"
          git add blog.html blog/*.html
          # We check if there are changes before committing
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-build blog posts from CMS"
            git push
          fi
